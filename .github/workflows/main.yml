name: Metal Rates Tracker

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # 📥 Checkout repo
      # -------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ✅ important for rebase

      # -------------------------------
      # 🐍 Setup Python
      # -------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------
      # 📦 Install dependencies
      # -------------------------------
      - name: Install dependencies
        run: |
          pip install requests openpyxl pytz

      # -------------------------------
      # ▶ Run your script
      # -------------------------------
      - name: Run script
        run: python pngtracker.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

      # -------------------------------
      # 💾 Commit & Push (FINAL FIX)
      # -------------------------------
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # ✅ STEP 1: Sync with remote FIRST
          git fetch origin
          git checkout main
          git pull --rebase origin main

          # ✅ STEP 2: Add & Commit
          git add .

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update metal rates"

            # ✅ STEP 3: Push safely
            git push origin main
          fi
