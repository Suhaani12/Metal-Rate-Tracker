name: Metal Rates Tracker

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # 📥 Checkout repo
      # -------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------
      # 🔄 Sync latest repo FIRST (FIX)
      # -------------------------------
      - name: Sync with repo
        run: |
          git fetch origin
          git checkout main
          git reset --hard origin/main

      # -------------------------------
      # 🐍 Setup Python
      # -------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------
      # 📦 Install dependencies
      # -------------------------------
      - name: Install dependencies
        run: |
          pip install requests openpyxl pytz

      # -------------------------------
      # ▶ Run your script
      # -------------------------------
      - name: Run script
        run: python pngtracker.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

      # -------------------------------
      # 💾 Commit & Push (FINAL)
      # -------------------------------
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update metal rates"

            # Force push to avoid conflicts
            git push origin main --force
          fi
